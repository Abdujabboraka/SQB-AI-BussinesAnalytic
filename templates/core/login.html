{% extends 'base.html' %}
{% block title %}Kirish — BiznesAI{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card-institutional animate-fade-in">
    <div class="text-center mb-5">
      <div class="brand-logo bg-primary mx-auto mb-3" style="width:56px;height:56px;font-size:2rem">
        <i class="bi bi-shield-check"></i>
      </div>
      <h1 class="h4 fw-800 mb-1">Xush kelibsiz</h1>
      <p class="text-muted">BiznesAI platformasiga kirish</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label">Foydalanuvchi nomi</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
          <input type="text" name="username" class="form-control border-start-0" placeholder="Loginni kiriting"
                 value="{{ username|default:'' }}" required autofocus>
        </div>
      </div>
      <div class="mb-5">
        <div class="d-flex justify-content-between align-items-center">
          <label class="form-label">Parol</label>
          <a href="#" class="small text-bank fw-600 mb-2 text-decoration-none">Parolni unutdingizmi?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
        </div>
      </div>
      
      <button type="submit" class="btn btn-bank w-100 py-3 mb-4">
        <i class="bi bi-box-arrow-in-right"></i> Tizimga kirish
      </button>
      
      <div class="text-center">
        <span class="text-muted small">Hisobingiz yo'qmi?</span>
        <a href="{% url 'register' %}" class="text-bank fw-700 ms-1 text-decoration-none">Ro'yxatdan o'tish</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
